# Congestion effort sweep — high effort, 714 MHz, 50% utilization, AR=1.0
# Maximum cell spreading during global placement — prioritizes routability.
# user_config.tcl: set clk_period 1400 | set util_target 0.50 | set cong_effort "high"

run_id_prefix: cong_high
design: GCN
platform_or_pdk: ASAP7_predictive_7nm_27R
flow_tool: Cadence_Innovus_23.12

clock_period_ns: 1.4
clock_period_ps: 1400
utilization_target: 0.50
aspect_ratio: 1.0
core_margin_um: 5

cong_effort: high
pin_strategy: west_ctrl_east_out
macro_strategy: none
cts_buffer_policy: BUF_INV_curated
route_strategy: globalDetail_antenna_fix
hold_io_false_path: true

sweep_knob: cong_effort
sweep_value: high
sweep_baseline: low

notes: >
  Maximum placement congestion effort. setPlaceMode -place_global_cong_effort high
  forces Innovus to strongly prioritize routability over timing-driven placement.
  Expected: lowest DRC count of the three cong_effort variants, longest runtime,
  and potentially the lowest WNS (placement further from timing optimal).
  With only 50% utilization the design has enough whitespace that the routing
  benefit may be marginal — the ML model should capture this diminishing return.
