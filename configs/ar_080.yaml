# Aspect ratio sweep — AR=0.8 (wide die), 714 MHz, 50% utilization
# Wide die (W > H) distributes cells horizontally — may improve horizontal
# routing but increases vertical wire lengths and left/right congestion.
# user_config.tcl: set clk_period 1400 | set util_target 0.50 | set aspect_ratio 0.8

run_id_prefix: ar_080
design: GCN
platform_or_pdk: ASAP7_predictive_7nm_27R
flow_tool: Cadence_Innovus_23.12

clock_period_ns: 1.4
clock_period_ps: 1400
utilization_target: 0.50
aspect_ratio: 0.8
core_margin_um: 5

cong_effort: low
pin_strategy: west_ctrl_east_out
macro_strategy: none
cts_buffer_policy: BUF_INV_curated
route_strategy: globalDetail_antenna_fix
hold_io_false_path: true

sweep_knob: aspect_ratio
sweep_value: 0.8
sweep_baseline: 1.0

notes: >
  Wide die (AR=0.8, W > H). Same cell count as baseline — only die shape
  changes. Expected: shorter vertical wires, longer horizontal routes.
  CTS wirelength and skew may differ vs square die. Compare wirelength_um,
  cts_wirelength_um, drc_count, and WNS vs ar_100 (baseline) to isolate
  die geometry effect.
