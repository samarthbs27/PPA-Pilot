# Aspect ratio sweep — AR=1.5 (very tall die), 714 MHz, 50% utilization
# Extreme tall die — stress test for CTS insertion delay and vertical routing.
# user_config.tcl: set clk_period 1400 | set util_target 0.50 | set aspect_ratio 1.5

run_id_prefix: ar_150
design: GCN
platform_or_pdk: ASAP7_predictive_7nm_27R
flow_tool: Cadence_Innovus_23.12

clock_period_ns: 1.4
clock_period_ps: 1400
utilization_target: 0.50
aspect_ratio: 1.5
core_margin_um: 5

cong_effort: low
pin_strategy: west_ctrl_east_out
macro_strategy: none
cts_buffer_policy: BUF_INV_curated
route_strategy: globalDetail_antenna_fix
hold_io_false_path: true

sweep_knob: aspect_ratio
sweep_value: 1.5
sweep_baseline: 1.0

notes: >
  Very tall die (AR=1.5, H >> W). Expected: notably higher CTS insertion delay
  and possible skew target miss; longer total wirelength; potential WNS
  degradation from increased net delays on long vertical paths. This is the
  geometric stress point — useful for showing the ML model learns AR effect
  on cts_max_insertion_delay_ps and wirelength_um.
