# Utilization sweep — 70% core utilization, 714 MHz fixed clock
# Goal: highly congested — expect significant WNS degradation, high DRC
# Synthesis: reuse GCN.1400.syn.v (no re-synthesis needed)
# user_config.tcl: set clk_period 1400 | set util_target 0.70 | set aspect_ratio 1.0

run_id_prefix: util_70
design: GCN
platform_or_pdk: ASAP7_predictive_7nm_27R
flow_tool: Cadence_Innovus_23.12

clock_period_ns: 1.4
clock_period_ps: 1400
utilization_target: 0.70
aspect_ratio: 1.0
core_margin_um: 5

cong_effort: low
pin_strategy: west_ctrl_east_out
macro_strategy: none
cts_buffer_policy: BUF_INV_curated
route_strategy: globalDetail_antenna_fix
hold_io_false_path: true

sweep_knob: utilization_target
sweep_value: 0.70
sweep_baseline: 0.50

notes: >
  High utilization stress run. Expected: actual density ~73-78%, congestion-
  driven WNS reduction, higher DRC count. At 70%+ the router has very
  limited whitespace for detours. This is the "congestion boundary" run —
  expected to show clear QoR degradation vs the 50% baseline even at the
  same 1.4 ns clock. Critical data point for the ML model boundary.
